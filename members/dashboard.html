<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Kanou Capital</title>
<meta name="description" content="Kanou Capital client portal dashboard.">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="./portal.css">
</head>
<body class="portal-page">

<header class="site-header">
  <div class="site-header__inner">
    <a href="../index.html" class="site-logo">
      <svg class="site-logo__icon" viewBox="0 0 36 36" fill="none" aria-label="Kanou Capital logo mark">
        <rect width="36" height="36" rx="2" fill="var(--color-navy, #0B1A2E)"/>
        <path d="M8 28V8h3.2v8.4L19.6 8h4l-8.8 8.8L24 28h-4.2l-7-9.2-1.6 1.6V28H8z" fill="var(--color-primary, #B8860B)"/>
      </svg>
      <div>
        <span class="site-logo__text">Kanou Capital</span>
        <span class="site-logo__tagline">Alpha + Impact</span>
      </div>
    </a>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav__links').classList.toggle('site-nav__links--open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="site-nav__links" role="list">
        <li><a href="../index.html" class="site-nav__link">Home</a></li>
        <li><a href="../pages/team.html" class="site-nav__link">Team</a></li>
        <li><a href="../pages/insights.html" class="site-nav__link">Insights</a></li>
        <li><a href="../pages/news.html" class="site-nav__link">News</a></li>
        <li><a href="../pages/contact.html" class="site-nav__link">Contact</a></li>
        <li><a href="./login.html" class="site-nav__link">Login</a></li>
      </ul>
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </div>
</header>

<main class="portal-main" style="background: var(--color-bg);">
  <div class="dashboard-content" id="dashboard-content">
    <div class="portal-loading" id="loading">
      <span class="spinner"></span> Loading...
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer__inner">
    <span class="site-footer__brand">Kanou Capital LLP</span>
    <ul class="site-footer__links" role="list">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../pages/team.html">Team</a></li>
      <li><a href="../pages/insights.html">Insights</a></li>
      <li><a href="../pages/news.html">News</a></li>
      <li><a href="../pages/contact.html">Contact</a></li>
      <li><a href="./login.html">Login</a></li>
    </ul>
    <div class="site-footer__attribution">
      <span>&copy; 2026 Kanou Capital LLP. All rights reserved.</span>
      &nbsp;&middot;&nbsp;
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./portal.js"></script>
<script>
function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function doSignOut() {
  var sb = initSupabase();
  if (sb) { await sb.auth.signOut(); }
  window.location.href = '../index.html';
}

(async function() {
  initSupabase();

  var authData = await requireAuth({});
  if (!authData) return;

  var profile = authData.profile;

  // Determine user's fund types
  var userFundTypes = profile.fund_types && Array.isArray(profile.fund_types) && profile.fund_types.length > 0
    ? profile.fund_types
    : (profile.fund_type ? [profile.fund_type] : []);
  var isMultiFund = userFundTypes.length > 1;

  // Fetch all documents the user has access to
  var allDocs;
  try {
    if (profile.role === 'admin') {
      allDocs = await getAllDocuments();
    } else {
      allDocs = await getDocuments(userFundTypes);
    }
  } catch (err) {
    allDocs = [];
  }

  var categoryOrder = ['presentation', 'annual_letter', 'monthly_letter', 'other'];

  // Helper: render document sections for a given fund type
  function renderDocSections(docs, fundType, isAdmin) {
    // Filter docs for this fund type + 'all'
    var filtered;
    if (isAdmin) {
      // Admin sees everything in this tab
      if (fundType === '__all__') {
        filtered = docs;
      } else {
        filtered = docs.filter(function(d) {
          return d.fund_type === fundType || d.fund_type === 'all';
        });
      }
    } else {
      filtered = docs.filter(function(d) {
        return d.fund_type === fundType || d.fund_type === 'all';
      });
    }

    // Group by category
    var categories = {};
    filtered.forEach(function(doc) {
      if (!categories[doc.category]) categories[doc.category] = [];
      categories[doc.category].push(doc);
    });

    var html = '';
    var hasDocs = false;

    categoryOrder.forEach(function(cat) {
      if (categories[cat] && categories[cat].length > 0) {
        hasDocs = true;
        html += '<div class="doc-category">';
        html += '<h2 class="doc-category__title">' + formatCategory(cat) + '</h2>';
        html += '<ul class="doc-list">';
        categories[cat].forEach(function(doc) {
          html += '<li class="doc-item">';
          html += '<div class="doc-item__info">';
          html += '<div class="doc-item__name">' + escapeHtml(doc.name) + '</div>';
          html += '<div class="doc-item__meta">' + formatDate(doc.uploaded_at);
          if (doc.file_size) html += ' &middot; ' + formatFileSize(doc.file_size);
          if (isAdmin) html += ' &middot; ' + formatFundType(doc.fund_type);
          html += '</div>';
          html += '</div>';
          html += '<a href="#" class="doc-item__download" data-path="' + escapeHtml(doc.file_path) + '">Download</a>';
          html += '</li>';
        });
        html += '</ul></div>';
      }
    });

    if (!hasDocs) {
      html += '<div class="doc-empty">No documents available. Check back soon.</div>';
    }

    return html;
  }

  // Render
  var container = document.getElementById('dashboard-content');
  var html = '';

  // Welcome bar with sign out
  html += '<div class="dashboard-welcome" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-4);">';
  html += '<div>';
  html += '<h1 class="dashboard-welcome__title">Welcome, ' + escapeHtml(profile.first_name) + '</h1>';
  var subtitleText = isMultiFund ? formatFundTypes(userFundTypes) : formatFundType(userFundTypes[0] || '');
  html += '<p class="dashboard-welcome__subtitle">' + subtitleText + ' - Access your fund documents and reports below.</p>';
  html += '</div>';
  html += '<div style="display: flex; gap: var(--space-3); align-items: center;">';
  if (profile.role === 'admin') {
    html += '<a href="./admin.html" style="font-family: var(--font-body); font-size: var(--text-xs); font-weight: 500; color: var(--color-text-muted); background: transparent; padding: var(--space-2) var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; transition: all 0.3s;">Admin Panel</a>';
  }
  html += '<button id="btn-logout" style="font-family: var(--font-body); font-size: var(--text-xs); font-weight: 500; color: var(--color-text-muted); background: transparent; padding: var(--space-2) var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.3s;">Sign Out</button>';
  html += '</div>';
  html += '</div>';

  if (isMultiFund) {
    // Render fund type tabs
    html += '<div class="fund-tabs">';
    userFundTypes.forEach(function(ft, idx) {
      html += '<button class="fund-tab' + (idx === 0 ? ' fund-tab--active' : '') + '" data-fund-tab="' + ft + '">' + formatFundType(ft) + '</button>';
    });
    html += '</div>';

    // Render tab panels
    userFundTypes.forEach(function(ft, idx) {
      html += '<div class="fund-tab-panel' + (idx === 0 ? ' fund-tab-panel--active' : '') + '" data-fund-panel="' + ft + '">';
      html += renderDocSections(allDocs, ft, profile.role === 'admin');
      html += '</div>';
    });
  } else {
    // Single fund type - no tabs needed
    var singleFund = userFundTypes[0] || 'all';
    html += renderDocSections(allDocs, profile.role === 'admin' ? '__all__' : singleFund, profile.role === 'admin');
  }

  if (profile.role === 'admin') {
    html += '<p style="text-align: center; margin-top: var(--space-8);"><a href="./admin.html" style="color: var(--color-primary); font-size: var(--text-sm); text-decoration: none; letter-spacing: 0.04em;">Go to Admin Panel &rarr;</a></p>';
  }

  container.innerHTML = html;

  // Attach sign out
  var logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', function() { doSignOut(); });
  }

  // Fund tab switching
  if (isMultiFund) {
    var fundTabs = container.querySelectorAll('.fund-tab');
    var fundPanels = container.querySelectorAll('.fund-tab-panel');
    fundTabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        fundTabs.forEach(function(t) { t.classList.remove('fund-tab--active'); });
        fundPanels.forEach(function(p) { p.classList.remove('fund-tab-panel--active'); });
        tab.classList.add('fund-tab--active');
        var targetFund = tab.getAttribute('data-fund-tab');
        container.querySelector('[data-fund-panel="' + targetFund + '"]').classList.add('fund-tab-panel--active');
      });
    });
  }

  // Handle download clicks
  container.addEventListener('click', async function(e) {
    var link = e.target.closest('.doc-item__download');
    if (link) {
      e.preventDefault();
      var path = link.getAttribute('data-path');
      link.textContent = 'Loading...';
      var url = await getDocumentSignedUrl(path);
      if (url && url !== '#') {
        window.open(url, '_blank');
      }
      link.textContent = 'Download';
    }
  });
})();
</script>
<script src="../theme.js"></script>
</body>
</html>
