<body class="portal-page">

<!-- Dashboard Header -->
<header class="dashboard-header">
  <div class="dashboard-header__inner">
    <a href="../index.html" class="dashboard-header__logo">
      <svg viewBox="0 0 36 36" fill="none" aria-label="Kanou Capital logo">
        <rect width="36" height="36" rx="2" fill="#0B1A2E"/>
        <path d="M8 28V8h3.2v8.4L19.6 8h4l-8.8 8.8L24 28h-4.2l-7-9.2-1.6 1.6V28H8z" fill="#B8860B"/>
      </svg>
      <span class="dashboard-header__logo-text">Kanou Capital</span>
    </a>
    <div class="dashboard-header__user">
      <div>
        <span class="dashboard-header__name" id="user-name"></span>
        <span class="dashboard-header__fund" id="user-fund"></span>
      </div>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="portal-main" style="background: var(--color-bg);">
  <div class="dashboard-content" id="dashboard-content">
    <div class="portal-loading" id="loading">
      <span class="spinner"></span> Loading documents...
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="site-footer">
  <div class="site-footer__inner">
    <span class="site-footer__brand">Kanou Capital LLP</span>
    <div class="site-footer__attribution">
      <span>&copy; 2026 Kanou Capital LLP. All rights reserved.</span>
      &nbsp;&middot;&nbsp;
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./portal.js"></script>
<script>
(async function() {
  initSupabase();

  var authData = await requireAuth({});
  if (!authData) return;

  var profile = authData.profile;

  // Update header
  document.getElementById('user-name').innerHTML = '<strong>' + profile.first_name + ' ' + profile.last_name + '</strong>';
  document.getElementById('user-fund').textContent = formatFundType(profile.fund_type);

  // Logout
  document.getElementById('btn-logout').addEventListener('click', function() {
    signOut();
  });

  // Fetch documents
  var docs;
  if (profile.role === 'admin') {
    docs = await getAllDocuments();
  } else {
    docs = await getDocuments(profile.fund_type);
  }

  // Group by category
  var categories = {};
  var categoryOrder = ['presentation', 'monthly_report', 'factsheet', 'other'];

  docs.forEach(function(doc) {
    if (!categories[doc.category]) {
      categories[doc.category] = [];
    }
    categories[doc.category].push(doc);
  });

  // Render
  var container = document.getElementById('dashboard-content');
  var html = '';

  html += '<div class="dashboard-welcome">';
  html += '<h1 class="dashboard-welcome__title">Welcome, ' + profile.first_name + '</h1>';
  html += '<p class="dashboard-welcome__subtitle">Access your fund documents and reports below.</p>';
  html += '</div>';

  var hasDocs = false;

  categoryOrder.forEach(function(cat) {
    if (categories[cat] && categories[cat].length > 0) {
      hasDocs = true;
      html += '<div class="doc-category">';
      html += '<h2 class="doc-category__title">' + formatCategory(cat) + '</h2>';
      html += '<ul class="doc-list">';

      categories[cat].forEach(function(doc) {
        html += '<li class="doc-item">';
        html += '<div class="doc-item__info">';
        html += '<div class="doc-item__name">' + escapeHtml(doc.name) + '</div>';
        html += '<div class="doc-item__meta">' + formatDate(doc.uploaded_at);
        if (doc.file_size) html += ' &middot; ' + formatFileSize(doc.file_size);
        if (profile.role === 'admin') html += ' &middot; ' + formatFundType(doc.fund_type);
        html += '</div>';
        html += '</div>';
        html += '<a href="#" class="doc-item__download" data-path="' + escapeHtml(doc.file_path) + '">Download</a>';
        html += '</li>';
      });

      html += '</ul></div>';
    }
  });

  if (!hasDocs) {
    html += '<div class="doc-empty">No documents available yet. Check back soon.</div>';
  }

  if (profile.role === 'admin') {
    html += '<p style="text-align: center; margin-top: var(--space-8);"><a href="./admin.html" style="color: var(--color-primary); font-size: var(--text-sm); text-decoration: none; letter-spacing: 0.04em;">Go to Admin Panel &rarr;</a></p>';
  }

  container.innerHTML = html;

  // Handle download clicks
  container.addEventListener('click', async function(e) {
    var link = e.target.closest('.doc-item__download');
    if (link) {
      e.preventDefault();
      var path = link.getAttribute('data-path');
      link.textContent = 'Loading...';
      var url = await getDocumentSignedUrl(path);
      if (url && url !== '#') {
        window.open(url, '_blank');
      }
      link.textContent = 'Download';
    }
  });
})();

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
<script src="../theme.js"></script>
</body>
</html>
