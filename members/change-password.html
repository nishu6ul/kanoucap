<title>Change Password | Kanou Capital</title>
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="./portal.css">
</head>
<body class="portal-page">

<section class="auth-section">
  <div class="auth-card">

    <div class="auth-card__logo">
      <svg viewBox="0 0 36 36" fill="none" aria-label="Kanou Capital logo">
        <rect width="36" height="36" rx="2" fill="#0B1A2E"/>
        <path d="M8 28V8h3.2v8.4L19.6 8h4l-8.8 8.8L24 28h-4.2l-7-9.2-1.6 1.6V28H8z" fill="#B8860B"/>
      </svg>
      <span class="auth-card__logo-text">Kanou Capital</span>
    </div>

    <h1 class="auth-card__title">Change Password</h1>
    <p class="auth-card__subtitle">Please set a new password for your account</p>

    <div id="alert-error" class="alert alert--error"></div>
    <div id="alert-success" class="alert alert--success"></div>

    <form class="portal-form" id="change-password-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" name="new_password" required autocomplete="new-password" placeholder="Minimum 8 characters" minlength="8">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm_password" required autocomplete="new-password" placeholder="Re-enter your new password">
      </div>
      <button type="submit" class="btn-primary" id="btn-change">Update Password</button>
    </form>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./portal.js"></script>
<script>
(function() {
  var form = document.getElementById('change-password-form');
  var alertError = document.getElementById('alert-error');
  var alertSuccess = document.getElementById('alert-success');
  var btn = document.getElementById('btn-change');

  initSupabase();

  // Must be logged in
  getSession().then(function(session) {
    if (!session) {
      window.location.href = './login.html';
    }
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    hideAlert(alertError);
    hideAlert(alertSuccess);

    var newPass = document.getElementById('new-password').value;
    var confirmPass = document.getElementById('confirm-password').value;

    if (newPass.length < 8) {
      showAlert(alertError, 'Password must be at least 8 characters.');
      return;
    }

    if (newPass !== confirmPass) {
      showAlert(alertError, 'Passwords do not match. Please try again.');
      return;
    }

    btn.textContent = 'Updating...';
    btn.disabled = true;

    try {
      await updatePassword(newPass);

      // Update profile: must_change_password = false
      var session = await getSession();
      if (session) {
        await updateProfile(session.user.id, { must_change_password: false });
        var profile = await getProfile(session.user.id);

        showAlert(alertSuccess, 'Password updated successfully. Redirecting...');

        setTimeout(function() {
          if (profile && profile.role === 'admin') {
            window.location.href = './admin.html';
          } else if (profile && !profile.disclaimer_accepted) {
            window.location.href = './disclaimer.html';
          } else {
            window.location.href = './dashboard.html';
          }
        }, 1500);
      }
    } catch (err) {
      showAlert(alertError, err.message || 'Failed to update password. Please try again.');
      btn.textContent = 'Update Password';
      btn.disabled = false;
    }
  });
})();
</script>
<script src="../theme.js"></script>
</body>
</html>
